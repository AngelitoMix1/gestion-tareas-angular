<div class="card-container">
  <h2>Iniciar Sesión</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <input type="email" formControlName="email" placeholder="Correo electrónico">
    <input type="password" formControlName="password" placeholder="Contraseña">
    
    <div *ngIf="loginError" class="error-msg">Credenciales incorrectas o usuario no registrado.</div>
    
    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>
  <a routerLink="/register" class="link">¿No tienes cuenta? Regístrate</a>
</div>
